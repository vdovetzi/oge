name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify version
        run: test "v$(python -c 'from oge import __version__; print(__version__)')" = "$GITHUB_REF_NAME"
      - name: Build
        run: python -m pip install build && python -m build
      - name: Verify wheel
        run: python -m pip install dist/*.whl && python -c "import oge; print(oge.__version__)"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag

