name: SonarCloud

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes xauth xvfb
          python -m pip install -e ".[dev]"
      - name: Generate coverage
        run: xvfb-run --auto-servernum coverage run -m unittest discover && coverage xml
      - name: Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
